<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionStore | Premium E-Commerce</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6fa;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0 50px;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35 0%, #f7b42c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #1a1a2e;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #ff6b35;
        }

        .user-name {
            font-weight: 600;
            color: #ff6b35;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            font-weight: 500;
            margin-left: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 50px;
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #ff6b35 0%, #f7b42c 100%);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 40px;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #1a1a2e;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Product Card */
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .discount-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #e74c3c;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            z-index: 10;
        }

        .product-image {
            height: 220px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .product-card:hover .product-image img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .product-category {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }

        .current-price {
            font-size: 24px;
            font-weight: 800;
            color: #ff6b35;
        }

        .old-price {
            font-size: 14px;
            color: #999;
            text-decoration: line-through;
        }

        /* Rating Stars */
        .rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

        .stars {
            color: #f7b42c;
            font-size: 14px;
        }

        .review-count {
            font-size: 12px;
            color: #999;
        }

        .sold-count {
            font-size: 12px;
            color: #27ae60;
            margin-bottom: 12px;
        }

        .btn-add {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7b42c 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-add:hover {
            transform: scale(1.02);
        }

        /* Cart */
        .cart-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            position: sticky;
            top: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .cart-header {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .cart-items {
            max-height: 400px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item-info h4 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .cart-item-info p {
            color: #ff6b35;
            font-weight: 700;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity-btn {
            background: #f0f0f0;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .grand-total {
            font-size: 22px;
            font-weight: 800;
            color: #ff6b35;
            margin-top: 10px;
        }

        .btn-checkout {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 20px;
        }

        /* Forms */
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b35 0%, #f7b42c 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        .orders-section, .invoice-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .data-table th {
            background: linear-gradient(135deg, #ff6b35 0%, #f7b42c 100%);
            color: white;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 3px;
        }

        .btn-track { background: #3498db; color: white; }
        .btn-cancel { background: #e74c3c; color: white; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #27ae60;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            display: none;
            z-index: 2000;
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .container { padding: 20px; }
            .navbar { padding: 0 20px; }
        }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">🔥 FusionStore</div>
        <div class="nav-links">
            <a onclick="showSection('products')">Shop</a>
            <a onclick="showSection('orders')">My Orders</a>
            <a onclick="showSection('login')">Account</a>
            <span id="userDisplay" style="display: none;"></span>
        </div>
    </div>
</nav>

<div class="container">
    <div class="hero" id="heroSection">
        <h1>Welcome to FusionStore 🎉</h1>
        <p>Premium products with exclusive discounts</p>
    </div>

    <div class="main-grid" id="mainContent">
        <div>
            <div class="section-title">🔥 Featured Products</div>
            <div class="products-grid" id="productsGrid"></div>
        </div>
        <div class="cart-section">
            <div class="cart-header">🛒 Your Cart</div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-total" id="cartTotal"></div>
            <button class="btn-checkout" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <div id="ordersSection" style="display: none;">
        <div class="orders-section">
            <h3 style="margin-bottom: 20px;">📦 My Orders</h3>
            <div id="ordersList"></div>
        </div>
        <div class="form-card">
            <h3 style="margin-bottom: 20px;">💳 Payment</h3>
            <form id="paymentForm">
                <div class="form-group"><label>Card Number</label><input type="text" placeholder="4242 4242 4242 4242"></div>
                <div class="form-group"><label>Expiry Date</label><input type="text" placeholder="MM/YY"></div>
                <div class="form-group"><label>CVV</label><input type="text" placeholder="123"></div>
                <button type="submit" class="btn-primary">Pay Now</button>
            </form>
        </div>
        <div id="invoiceSection" style="display: none;" class="invoice-section">
            <h3>🧾 Invoice</h3>
            <div id="invoiceContent"></div>
            <button class="btn-primary" style="margin-top: 20px;" onclick="printInvoice()">Print Invoice</button>
        </div>
    </div>

    <div id="loginSection" style="display: none;">
        <div class="form-card">
            <h3 style="margin-bottom: 20px;">🔐 Login</h3>
            <form id="loginForm">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" required></div>
                <button type="submit" class="btn-primary">Login</button>
                <p style="text-align: center; margin-top: 15px;">No account? <a href="#" onclick="showRegister()">Register</a></p>
            </form>
        </div>
        <div id="registerSection" style="display: none;">
            <div class="form-card">
                <h3>📝 Create Account</h3>
                <form id="registerForm">
                    <div class="form-group"><label>Full Name</label><input type="text" id="regName" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="regPassword" required></div>
                    <div class="form-group"><label>Phone</label><input type="text" id="regPhone"></div>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Products with REAL images, ratings, sold counts, discounts
    let products = [
        { id: 1, name: 'Apple MacBook Pro 14"', category: 'Laptops', price: 1999, oldPrice: 2499, discount: 20, image: 'https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=400', rating: 4.8, reviews: 234, sold: 1250 },
        { id: 2, name: 'Sony WH-1000XM5', category: 'Headphones', price: 349, oldPrice: 399, discount: 12, image: 'https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=400', rating: 4.9, reviews: 567, sold: 3450 },
        { id: 3, name: 'Logitech MX Master 3S', category: 'Mice', price: 89, oldPrice: 99, discount: 10, image: 'https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7?w=400', rating: 4.7, reviews: 189, sold: 890 },
        { id: 4, name: 'Samsung 32" 4K Monitor', category: 'Monitors', price: 449, oldPrice: 599, discount: 25, image: 'https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400', rating: 4.6, reviews: 312, sold: 540 },
        { id: 5, name: 'Keychron K2 Mechanical', category: 'Keyboards', price: 79, oldPrice: 99, discount: 20, image: 'https://images.unsplash.com/photo-1587829741301-dc798b83add3?w=400', rating: 4.8, reviews: 423, sold: 2100 },
        { id: 6, name: 'Apple Watch Series 9', category: 'Wearables', price: 399, oldPrice: 429, discount: 7, image: 'https://images.unsplash.com/photo-1579586337278-3befd40fd17a?w=400', rating: 4.7, reviews: 678, sold: 3200 },
        { id: 7, name: 'iPhone 15 Pro', category: 'Phones', price: 999, oldPrice: 1099, discount: 9, image: 'https://images.unsplash.com/photo-1695048133142-1a20484d2569?w=400', rating: 4.9, reviews: 1234, sold: 8900 },
        { id: 8, name: 'Anker Power Bank 20K', category: 'Accessories', price: 39, oldPrice: 49, discount: 20, image: 'https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcSbEBs5AMyCOwxOW7tpH0Flm-SuO6FDZn4vm7e8JbCaaQkUW2f8IMbG6hTNn0FXzFrVqGlMK4dX_Z7rIQAx9V1Azjq7iWUix_medKTLIbEbURRCU26n&usqp=CAc', rating: 4.5, reviews: 456, sold: 5670 }
    ];

    let cart = [];
    let orders = [];
    let users = [
        { id: 1, name: 'Ahmed Mohamed', email: 'ahmed@example.com', password: '123', phone: '+966500000000' },
        { id: 2, name: 'Sara Ali', email: 'sara@example.com', password: '123', phone: '+966511111111' }
    ];
    let currentUser = null;
    let nextOrderId = 1001;

    function showToast(msg) {
        let toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    function showSection(section) {
        document.getElementById('mainContent').style.display = section === 'products' ? 'grid' : 'none';
        document.getElementById('ordersSection').style.display = section === 'orders' ? 'block' : 'none';
        document.getElementById('loginSection').style.display = section === 'login' ? 'block' : 'none';
        document.getElementById('heroSection').style.display = section === 'products' ? 'block' : 'none';
        
        if (section === 'orders' && !currentUser) { showToast('Please login first'); showSection('login'); return; }
        if (section === 'orders') renderOrders();
        if (section === 'products') renderProducts();
        renderCart();
    }

    function renderProducts() {
        let grid = document.getElementById('productsGrid');
        grid.innerHTML = products.map(p => `
            <div class="product-card">
                ${p.discount ? `<div class="discount-badge">-${p.discount}%</div>` : ''}
                <div class="product-image"><img src="${p.image}" alt="${p.name}" loading="lazy"></div>
                <div class="product-info">
                    <div class="product-title">${p.name}</div>
                    <div class="product-category">${p.category}</div>
                    <div class="price-row">
                        <span class="current-price">$${p.price}</span>
                        ${p.oldPrice ? `<span class="old-price">$${p.oldPrice}</span>` : ''}
                    </div>
                    <div class="rating">
                        <div class="stars">${'★'.repeat(Math.floor(p.rating))}${p.rating % 1 ? '½' : ''}${'☆'.repeat(5 - Math.ceil(p.rating))}</div>
                        <div class="review-count">(${p.reviews} reviews)</div>
                    </div>
                    <div class="sold-count">🔥 ${p.sold} sold</div>
                    <button class="btn-add" onclick="addToCart(${p.id})">🛒 Add to Cart</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(productId) {
        if (!currentUser) { showToast('Please login first'); showSection('login'); return; }
        let product = products.find(p => p.id === productId);
        let existing = cart.find(i => i.id === productId);
        if (existing) existing.quantity++;
        else cart.push({ ...product, quantity: 1 });
        renderCart();
        showToast(`${product.name} added to cart`);
    }

    function updateQuantity(productId, delta) {
        let item = cart.find(i => i.id === productId);
        if (item) {
            item.quantity += delta;
            if (item.quantity <= 0) cart = cart.filter(i => i.id !== productId);
            renderCart();
        }
    }

    function removeFromCart(productId) {
        cart = cart.filter(i => i.id !== productId);
        renderCart();
        showToast('Item removed');
    }

    function renderCart() {
        let container = document.getElementById('cartItems');
        let totalContainer = document.getElementById('cartTotal');
        if (cart.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:#999;">Your cart is empty</p>';
            totalContainer.innerHTML = '';
            return;
        }
        container.innerHTML = cart.map(item => `
            <div class="cart-item">
                <div class="cart-item-info"><h4>${item.name}</h4><p>$${item.price}</p></div>
                <div class="cart-item-actions">
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                    <span>${item.quantity}</span>
                    <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                    <button class="quantity-btn" style="background:#e74c3c;color:white;" onclick="removeFromCart(${item.id})">🗑️</button>
                </div>
            </div>
        `).join('');
        let subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        let tax = subtotal * 0.1;
        totalContainer.innerHTML = `
            <div style="display:flex;justify-content:space-between;"><span>Subtotal:</span><span>$${subtotal}</span></div>
            <div style="display:flex;justify-content:space-between;"><span>Tax (10%):</span><span>$${tax}</span></div>
            <div class="grand-total" style="display:flex;justify-content:space-between;"><span>Total:</span><span>$${subtotal + tax}</span></div>
        `;
    }

    function checkout() {
        if (cart.length === 0) { showToast('Cart is empty'); return; }
        if (!currentUser) { showToast('Please login first'); showSection('login'); return; }
        let subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
        let total = subtotal * 1.1;
        let newOrder = { id: nextOrderId++, date: new Date().toLocaleDateString(), items: JSON.parse(JSON.stringify(cart)), total: total.toFixed(2), status: 'Processing' };
        orders.unshift(newOrder);
        showToast('Order placed successfully!');
        cart = [];
        renderCart();
        showSection('orders');
        renderOrders();
        document.getElementById('invoiceSection').style.display = 'block';
        document.getElementById('invoiceContent').innerHTML = `
            <p><strong>Invoice #:</strong> INV-${newOrder.id}</p><p><strong>Date:</strong> ${newOrder.date}</p>
            <p><strong>Customer:</strong> ${currentUser.name}</p><hr>
            ${newOrder.items.map(i => `<p>${i.name} x${i.quantity} = $${i.price * i.quantity}</p>`).join('')}<hr>
            <p><strong>Total Paid:</strong> $${newOrder.total}</p><p><strong>Status:</strong> ✅ Confirmed</p>
        `;
    }

    function renderOrders() {
        let container = document.getElementById('ordersList');
        if (orders.length === 0) { container.innerHTML = '<p style="text-align:center;">No orders yet</p>'; return; }
        container.innerHTML = `<table class="data-table"><tr><th>Order ID</th><th>Date</th><th>Items</th><th>Total</th><th>Status</th><th>Actions</th></tr>
            ${orders.map(o => `<tr><td>#${o.id}</td><td>${o.date}</td><td>${o.items.length}</td><td>$${o.total}</td><td style="color:#27ae60;">${o.status}</td>
            <td><button class="btn-small btn-track" onclick="trackOrder(${o.id})">Track</button><button class="btn-small btn-cancel" onclick="cancelOrder(${o.id})">Cancel</button></td></tr>`).join('')}</table>`;
    }

    function trackOrder(id) { showToast(`Order #${id}: Processing - Estimated delivery 3-5 days`); }
    function cancelOrder(id) { let o = orders.find(o => o.id === id); if (o && o.status === 'Processing') { o.status = 'Cancelled'; showToast(`Order #${id} cancelled`); renderOrders(); } else showToast('Cannot cancel this order'); }
    function printInvoice() { let w = window.open('', '_blank'); w.document.write(`<html><head><title>Invoice</title><style>body{font-family:Arial;padding:40px;}</style></head><body>${document.getElementById('invoiceContent').innerHTML}</body></html>`); w.print(); }

    document.getElementById('loginForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        let user = users.find(u => u.email === document.getElementById('loginEmail').value && u.password === document.getElementById('loginPassword').value);
        if (user) {
            currentUser = user;
            document.getElementById('userDisplay').innerHTML = `<span class="user-name">👋 Hi ${user.name}</span> <button class="logout-btn" onclick="logout()">Logout</button>`;
            document.getElementById('userDisplay').style.display = 'inline';
            showToast(`Welcome ${user.name}`);
            showSection('products');
        } else showToast('Invalid credentials');
    });

    document.getElementById('registerForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        if (users.find(u => u.email === document.getElementById('regEmail').value)) { showToast('Email exists'); return; }
        let newUser = { id: users.length + 1, name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPassword').value, phone: document.getElementById('regPhone').value };
        users.push(newUser); currentUser = newUser;
        document.getElementById('userDisplay').innerHTML = `<span class="user-name">👋 Hi ${newUser.name}</span> <button class="logout-btn" onclick="logout()">Logout</button>`;
        document.getElementById('userDisplay').style.display = 'inline';
        showToast('Registration successful!'); showSection('products');
    });

    function logout() { currentUser = null; document.getElementById('userDisplay').style.display = 'none'; cart = []; renderCart(); showToast('Logged out'); showSection('products'); }
    function showRegister() { document.getElementById('registerSection').style.display = 'block'; document.querySelector('#loginSection .form-card').style.display = 'none'; }

    renderProducts(); renderCart();
</script>
</body>
</html>
